<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouveau mot de passe — RunLog</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;500;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #141418; --border: #222228;
      --accent: #e8ff47; --accent2: #ff6b35; --text: #f0f0ee; --muted: #6b6b72;
      --font-head: 'Barlow Condensed', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    .login-box {
      width: 100%; max-width: 420px; padding: 3rem; background: var(--surface);
      border: 1px solid var(--border); border-top: 3px solid var(--accent); margin: 1rem;
    }
    .logo { font-family: var(--font-head); font-weight: 900; font-size: 1.8rem; letter-spacing: .08em; text-transform: uppercase; text-align: center; margin-bottom: 2rem; color: var(--text); text-decoration: none; display: block; }
    .logo span { color: var(--accent); }
    
    h1 { font-family: var(--font-head); font-weight: 900; font-size: 2rem; text-transform: uppercase; margin-bottom: .3rem; text-align: center; }
    h1 span { color: var(--accent); }
    .subtitle { font-size: .85rem; color: var(--muted); text-align: center; margin-bottom: 2rem; line-height: 1.6; }

    .form-group { margin-bottom: 1.4rem; }
    .form-group label { display: block; font-family: var(--font-head); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 0.8rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.95rem; border-radius: 2px; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    
    .btn-login { width: 100%; margin-top: .5rem; font-family: var(--font-head); font-weight: 700; font-size: 1rem; letter-spacing: .15em; text-transform: uppercase; padding: 1rem; border-radius: 2px; cursor: pointer; border: 2px solid var(--accent); background: var(--accent); color: #0d0d0f; transition: all .2s; }
    .btn-login:hover { background: transparent; color: var(--accent); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg { padding: 1rem; border-radius: 2px; margin-top: 1.5rem; font-size: 0.9rem; display: none; text-align: center; font-family: var(--font-head); letter-spacing: 0.05em; text-transform: uppercase; }
    .msg-error { background: rgba(255,107,53,0.1); color: var(--accent2); border: 1px solid var(--accent2); }
    .msg-success { background: rgba(232,255,71,0.1); color: var(--accent); border: 1px solid var(--accent); }
  </style>
</head>
<body>

  <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
    <div class="login-box">
      <div class="logo">Run<span>Log</span></div>
      <h1 id="title-main">Nouveau <span>Pass</span></h1>
      <p id="subtitle-text" class="subtitle">Réinitialise ton accès athlète en choisissant un mot de passe sécurisé.</p>

      <form id="form-reset-password">
        <div class="form-group">
          <label id="lbl-new-pass">Nouveau mot de passe</label>
          <input type="password" id="new-password" placeholder="Minimum 6 caractères" required minlength="6"/>
        </div>
        
        <div class="form-group">
          <label id="lbl-confirm-pass">Confirmer le nouveau mot de passe</label>
          <input type="password" id="confirm-password" placeholder="Répète le nouveau mot de passe" required minlength="6"/>
        </div>

        <button type="submit" class="btn-login" id="btn-submit">Mettre à jour →</button>
      </form>
      
      <div id="global-msg" class="msg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentLang = 'fr';

    const translations = {
      fr: {
        doc_title: "Nouveau mot de passe — RunLog",
        title_main: "Nouveau <span>Pass</span>",
        subtitle_text: "Réinitialise ton accès athlète en choisissant un mot de passe sécurisé.",
        lbl_new_pass: "Nouveau mot de passe",
        ph_new_pass: "Minimum 6 caractères",
        lbl_confirm_pass: "Confirmer le nouveau mot de passe",
        ph_confirm_pass: "Répète le nouveau mot de passe",
        btn_submit: "Mettre à jour →",
        btn_loading: "Mise à jour…",
        err_session: "❌ Lien invalide ou expiré. Veuillez refaire une demande.",
        err_mismatch: "⚠️ Les deux nouveaux mots de passe ne correspondent pas.",
        err_generic: "❌ Une erreur est survenue.",
        success_msg: "🔒 Mot de passe réinitialisé ! Redirection..."
      },
      en: {
        doc_title: "New Password — RunLog",
        title_main: "New <span>Password</span>",
        subtitle_text: "Reset your athlete access by choosing a secure password.",
        lbl_new_pass: "New password",
        ph_new_pass: "Minimum 6 characters",
        lbl_confirm_pass: "Confirm new password",
        ph_confirm_pass: "Repeat new password",
        btn_submit: "Update →",
        btn_loading: "Updating…",
        err_session: "❌ Invalid or expired link. Please submit a new request.",
        err_mismatch: "⚠️ Both passwords do not match.",
        err_generic: "❌ An error occurred.",
        success_msg: "🔒 Password reset successfully! Redirecting..."
      },
      es: {
        doc_title: "Nueva contraseña — RunLog",
        title_main: "Nueva <span>Contraseña</span>",
        subtitle_text: "Restablece tu acceso de atleta eligiendo una contraseña segura.",
        lbl_new_pass: "Nueva contraseña",
        ph_new_pass: "Mínimo 6 caracteres",
        lbl_confirm_pass: "Confirmar nueva contraseña",
        ph_confirm_pass: "Repite la nueva contraseña",
        btn_submit: "Actualizar →",
        btn_loading: "Actualizando…",
        err_session: "❌ Enlace inválido o caducado. Por favor, solicita uno nuevo.",
        err_mismatch: "⚠️ Las dos contraseñas no coinciden.",
        err_generic: "❌ Ha ocurrido un error.",
        success_msg: "🔒 ¡Contraseña restablecida! Redirigiendo..."
      }
    };

    function applyLanguage(lang) {
      currentLang = ['fr', 'en', 'es'].includes(lang) ? lang : 'fr';
      const t = translations[currentLang];

      document.title = t.doc_title;
      document.getElementById('title-main').innerHTML = t.title_main;
      document.getElementById('subtitle-text').textContent = t.subtitle_text;
      document.getElementById('lbl-new-pass').textContent = t.lbl_new_pass;
      document.getElementById('new-password').placeholder = t.ph_new_pass;
      document.getElementById('lbl-confirm-pass').textContent = t.lbl_confirm_pass;
      document.getElementById('confirm-password').placeholder = t.ph_confirm_pass;
      
      const btn = document.getElementById('btn-submit');
      if (btn && btn.textContent !== translations[currentLang].btn_loading) {
        btn.textContent = t.btn_submit;
      }
    }

    function showMessage(text, isError = false) {
      const msgDiv = document.getElementById('global-msg');
      if (msgDiv) {
        msgDiv.textContent = text;
        msgDiv.className = `msg ${isError ? 'msg-error' : 'msg-success'}`;
        msgDiv.style.display = 'block';
      }
    }

    function hideMessage() {
      const msgDiv = document.getElementById('global-msg');
      if (msgDiv) msgDiv.style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Détection de la langue
      let savedLang = localStorage.getItem('runlog_lang');
      if (!savedLang) {
        savedLang = (navigator.language || navigator.userLanguage).split('-')[0];
      }
      applyLanguage(savedLang);

      // Vérification de la session active issue du lien e-mail
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) {
        showMessage(translations[currentLang].err_session, true);
        document.getElementById('form-reset-password').style.display = 'none';
      }
    });

    document.getElementById('form-reset-password').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const t = translations[currentLang];
      const newPass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;
      const btn = document.getElementById('btn-submit');

      if (newPass !== confirmPass) {
        showMessage(t.err_mismatch, true);
        return;
      }

      btn.disabled = true;
      btn.textContent = t.btn_loading;

      try {
        const { error: updateError } = await supabaseClient.auth.updateUser({
          password: newPass
        });

        if (updateError) {
          showMessage("❌ " + updateError.message, true);
          btn.disabled = false;
          btn.textContent = t.btn_submit;
          return;
        }

        showMessage(t.success_msg, false);
        
        // Déconnexion propre pour forcer l'utilisateur à se reconnecter avec ses nouveaux identifiants
        await supabaseClient.auth.signOut();

        setTimeout(() => { 
          window.location.href = 'index.html'; 
        }, 2000);

      } catch (err) {
        showMessage(t.err_generic, true);
        btn.disabled = false;
        btn.textContent = t.btn_submit;
      }
    });
  </script>
</body>
</html>
