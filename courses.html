<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Courses — RunLog</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;500;700;900&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #141418;
      --border:    #222228;
      --accent:    #e8ff47;
      --accent2:   #ff6b35;
      --text:      #f0f0ee;
      --muted:     #6b6b72;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: .4;
    }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 3rem; border-bottom: 1px solid var(--border); background: rgba(13,13,15,.85); backdrop-filter: blur(12px); z-index: 100; }
    .logo { font-family: var(--font-head); font-weight: 900; font-size: 1.4rem; letter-spacing: .08em; text-transform: uppercase; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    nav ul { list-style: none; display: flex; gap: 2.5rem; }
    nav a { font-family: var(--font-head); font-weight: 500; font-size: .95rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
    nav a:hover, nav a.active { color: var(--accent); }

    /* PAGE HEADER */
    .page-header { padding: 9rem 4rem 4rem; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
    .page-header::after { content: 'COURSES'; position: absolute; right: -0.02em; bottom: -.15em; font-family: var(--font-head); font-weight: 900; font-size: clamp(8rem, 18vw, 18rem); line-height: 1; color: transparent; -webkit-text-stroke: 1px var(--border); pointer-events: none; user-select: none; }
    .page-tag { font-family: var(--font-head); font-size: .8rem; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
    .page-tag::before { content: ''; display: block; width: 2rem; height: 1px; background: var(--accent); }
    h1 { font-family: var(--font-head); font-weight: 900; font-size: clamp(3rem, 6vw, 5.5rem); line-height: .95; text-transform: uppercase; position: relative; z-index: 1; }
    h1 span { color: var(--accent); }

    /* FILTERS */
    .filters { padding: 2rem 4rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); }
    .filter-label { font-family: var(--font-head); font-size: .8rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-right: .5rem; }
    .filter-btn { font-family: var(--font-head); font-weight: 700; font-size: .8rem; letter-spacing: .15em; text-transform: uppercase; padding: .5rem 1.2rem; border-radius: 2px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .2s; }
    .filter-btn:hover { border-color: var(--muted); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0f; }
    .filter-sep { width: 1px; height: 24px; background: var(--border); margin: 0 .5rem; }

    /* MAIN */
    main { padding: 2rem 4rem 6rem; }
    .results-count { font-family: var(--font-head); font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; }
    .results-count strong { color: var(--accent); }

    /* TABLE — table-layout:auto, largeurs sur th uniquement */
    .table-wrap { overflow-x: auto; }

    table { border-collapse: collapse; width: 100%; }

    thead th {
      font-family: var(--font-head); font-size: .75rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted);
      padding: .85rem 1rem; border-bottom: 1px solid var(--border);
      text-align: left; white-space: nowrap;
    }

    /* Chaque th impose sa largeur à sa colonne entière */
    .th-rank  { width: 60px;  text-align: center; }
    .th-nom   { width: 200px; }
    .th-type  { width: 80px; }
    .th-date  { width: 130px; }
    .th-dist  { width: 90px;  text-align: right; }
    .th-dplus { width: 80px;  text-align: right; }
    .th-temps { width: 100px; text-align: right; }
    .th-part  { width: 120px; text-align: right; }
    .th-cat   { width: 110px; text-align: center; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:hover { background: var(--surface); }

    td { padding: 1rem 1rem; vertical-align: middle; white-space: nowrap; }

    /* Rank */
    .rank-pill {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-weight: 900; font-size: 1.2rem;
      min-width: 2.2rem; height: 2.2rem; padding: 0 .4rem;
      border-radius: 2px; background: var(--surface); color: var(--muted);
    }
    .rank-pill.gold   { background: rgba(255,215,0,.15);   color: #ffd700; }
    .rank-pill.silver { background: rgba(192,192,192,.15);  color: #c0c0c0; }
    .rank-pill.bronze { background: rgba(205,127,50,.15);   color: #cd7f32; }
    .rank-pill.top10  { background: rgba(232,255,71,.1);    color: var(--accent); }

    /* Name cell */
    .race-name { font-family: var(--font-head); font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: .04em; white-space: normal; }
    .race-location { font-size: .75rem; color: var(--muted); font-weight: 300; margin-top: .1rem; }

    /* Badge */
    .badge { font-family: var(--font-head); font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; padding: .25rem .6rem; border-radius: 2px; display: inline-block; }
    .badge-trail { background: rgba(232,255,71,.1); color: var(--accent); }
    .badge-route { background: rgba(255,107,53,.1); color: var(--accent2); }

    /* Numbers */
    .td-num { font-family: var(--font-head); font-weight: 700; font-size: 1rem; }
    .td-num small { font-weight: 300; font-size: .72rem; color: var(--muted); }
    .td-muted { color: var(--muted); font-size: .88rem; }
    .td-r { text-align: right; }
    .td-c { text-align: center; }
    .dplus { color: var(--accent2); }

    .no-results { text-align: center; padding: 5rem 2rem; font-family: var(--font-head); font-size: 1.5rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); display: none; }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 2rem 4rem; display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: .8rem; }
    .footer-logo { font-family: var(--font-head); font-weight: 900; font-size: 1rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .footer-logo span { color: var(--accent); }

    @media (max-width: 900px) {
      nav { padding: 1rem 1.5rem; }
      nav ul { gap: 1.5rem; }
      .page-header { padding: 7rem 1.5rem 3rem; }
      .filters { padding: 1.5rem; }
      main { padding: 1.5rem 1rem 4rem; }
      .col-date, .col-dplus, .col-part { display: none; }
      footer { flex-direction: column; gap: .5rem; text-align: center; padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Run<span>Log</span></a>
    <ul>
      <li><a href="index.html">Accueil</a></li>
      <li><a href="courses.html" class="active">Courses</a></li>
      <li><a href="stats.html">Stats</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div class="page-tag">Historique complet</div>
    <h1>Mes <span>courses</span></h1>
  </div>

  <div class="filters">
    <span class="filter-label">Type</span>
    <button class="filter-btn active" data-type="all">Tout</button>
    <button class="filter-btn" data-type="Trail">Trail</button>
    <button class="filter-btn" data-type="Route">Route</button>
    <div class="filter-sep"></div>
    <span class="filter-label">Année</span>
    <button class="filter-btn active" data-year="all">Tout</button>
    <button class="filter-btn" data-year="2024">2024</button>
    <button class="filter-btn" data-year="2023">2023</button>
    <button class="filter-btn" data-year="2022">2022</button>
    <button class="filter-btn" data-year="2021">2021</button>
  </div>

  <main>
    <div class="results-count"><strong id="count">12</strong> courses affichées</div>
    <div class="table-wrap">
      <table id="races-table">
        <thead>
          <tr>
            <th class="th-rank">Clt.</th>
            <th class="th-nom">Course</th>
            <th class="th-type">Type</th>
            <th class="th-date">Date</th>
            <th class="th-dist">Distance</th>
            <th class="th-dplus">D+</th>
            <th class="th-temps">Temps</th>
            <th class="th-part">Participants</th>
            <th class="th-cat">Clt. Cat.</th>
          </tr>
        </thead>
        <tbody id="races-body"></tbody>
      </table>
      <div class="no-results" id="no-results">Aucune course trouvée 😅</div>
    </div>
  </main>

  <footer>
    <div class="footer-logo">Run<span>Log</span></div>
    <div>Fait avec ❤️ et beaucoup de dénivelé</div>
  </footer>

  <script>
// On va chercher la liste des fichiers créés par le CMS
async function loadCourses() {
  try {
    // Étape A : On demande à l'API GitHub la liste des fichiers dans le dossier
    const response = await fetch('https://api.github.com/repos/gauthier8dorval/RUNLOG/contents/content/courses');
    const files = await response.json();
    
    // Étape B : On va lire le contenu de chaque fichier JSON trouvé
    const fetchPromises = files
      .filter(file => file.name.endsWith('.json'))
      .map(file => fetch(file.download_url).then(res => res.json()));
      
    const courses = await fetchPromises.all(fetchPromises);

    // Étape C : Ton code actuel prend le relais avec les vraies données !
    initTable(courses); 

  } catch (error) {
    console.error("Erreur lors du chargement des courses :", error);
  }
}

function initTable(courses) {
  // --- ENCAPSULE TON CODE DE FILTRES ACTUEL ICI ---
  // Remets ici tes fonctions existantes : renderTable(courses), applyFilters(), etc.
  // En veillant à ce qu'elles utilisent le tableau "courses" qu'on vient de récupérer.
  
  renderTable(courses);
}

// On lance le chargement au démarrage de la page
loadCourses();

    function rankClass(n) {
      if (n === 1) return 'gold';
      if (n === 2) return 'silver';
      if (n === 3) return 'bronze';
      if (n <= 10) return 'top10';
      return '';
    }

    function renderTable(data) {
      const tbody = document.getElementById('races-body');
      const noRes = document.getElementById('no-results');
      document.getElementById('count').textContent = data.length;
      if (data.length === 0) { tbody.innerHTML = ''; noRes.style.display = 'block'; return; }
      noRes.style.display = 'none';
      tbody.innerHTML = data.map(c => `
        <tr>
          <td class="td-c">
            <div class="rank-pill ${rankClass(c.classement)}">${c.classement}</div>
          </td>
          <td>
            <div class="race-name">${c.nom}</div>
            <div class="race-location">${c.lieu}</div>
          </td>
          <td><span class="badge badge-${c.type.toLowerCase()}">${c.type}</span></td>
          <td class="td-muted">${c.date}</td>
          <td class="td-num td-r">${c.dist}<small>km</small></td>
          <td class="td-num td-r ${c.dplus ? 'dplus' : 'td-muted'}">${c.dplus ? c.dplus + '<small>m</small>' : '—'}</td>
          <td class="td-num td-r">${c.temps}</td>
          <td class="td-num td-r td-muted">${c.participants.toLocaleString('fr-FR')}</td>
          <td class="td-c">
            <div class="rank-pill ${rankClass(c.classementCat)}">${c.classementCat}<small style="font-size:.58rem;font-weight:300;margin-left:.15rem">${c.cat}</small></div>
          </td>
        </tr>
      `).join('');
    }

    let activeType = 'all';
    let activeYear = 'all';

    function applyFilters() {
      const filtered = courses.filter(c => {
        const typeOk = activeType === 'all' || c.type === activeType;
        const yearOk = activeYear === 'all' || c.annee === parseInt(activeYear);
        return typeOk && yearOk;
      });
      renderTable(filtered);
    }

    document.querySelectorAll('[data-type]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeType = btn.dataset.type;
        applyFilters();
      });
    });

    document.querySelectorAll('[data-year]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-year]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeYear = btn.dataset.year;
        applyFilters();
      });
    });

    renderTable(courses);
  </script>
</body>
</html>
