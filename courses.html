<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Courses - RUNLOG</title>
  <style>
    /* Tes styles actuels peuvent rester ici */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #fff; padding: 2rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
    th { color: #888; font-weight: 500; }
    .badge-table { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
    .badge-trail { background: #2e7d32; color: #e8f5e9; }
    .badge-route { background: #1565c0; color: #e3f2fd; }
    .rank-pill { display: inline-block; padding: 2px 6px; border-radius: 4px; background: #333; font-size: 0.9rem; }
    .rank-1 { background: #ffd700; color: #000; font-weight: bold; }
    .rank-2 { background: #c0c0c0; color: #000; font-weight: bold; }
    .rank-3 { background: #cd7f32; color: #000; font-weight: bold; }
    .td-num { font-variant-numeric: tabular-nums; }
    .td-r { text-align: right; }
    .td-c { text-align: center; }
    .td-muted { color: #666; }
    .filter-btn { background: #222; color: #aaa; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
    .filter-btn.active { background: #fff; color: #000; border-color: #fff; }
    .filters-section { margin-bottom: 1.5rem; }
  </style>
</head>
<body>

  <h1>🏃‍♂️ Liste des Courses</h1>

  <div class="filters-section">
    <div style="margin-bottom: 10px;">
      <span style="color: #888; margin-right: 10px;">Type :</span>
      <button class="filter-btn active" data-type="all">Tous</button>
      <button class="filter-btn" data-type="Trail">Trail</button>
      <button class="filter-btn" data-type="Route">Route</button>
    </div>
    <div>
      <span style="color: #888; margin-right: 10px;">Année :</span>
      <button class="filter-btn active" data-year="all">Toutes</button>
      <button class="filter-btn" data-year="2026">2026</button>
      <button class="filter-btn" data-year="2025">2025</button>
      <button class="filter-btn" data-year="2024">2024</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Événement / Lieu</th>
        <th>Date</th>
        <th>Type</th>
        <th class="td-r">Distance</th>
        <th class="td-r">D+</th>
        <th class="td-r">Chrono</th>
        <th class="td-r">Part.</th>
        <th class="td-c">Cat.</th>
      </tr>
    </thead>
    
    <tbody id="courses-tbody">
      <tr>
        <td colspan="8" style="text-align: center; padding: 2rem; color: #666;">
          Chargement des courses en cours...
        </td>
      </tr>
    </tbody>
  </table>

  <script>
    function rankClass(rank) {
      if (rank === 1) return 'rank-1';
      if (rank === 2) return 'rank-2';
      if (rank === 3) return 'rank-3';
      return '';
    }

    let courses = [];
    let activeType = 'all';
    let activeYear = 'all';

    // Récupération automatique du fichier généré par l'admin à la racine
    async function loadCourses() {
      try {
        const response = await fetch('./courses.json');
        const data = await response.json();
        
        // On extrait le tableau
        courses = data.courses || [];

        // Tri automatique de la course la plus récente à la plus ancienne
        courses.sort((a, b) => b.annee - a.annee);

        applyFilters();
      } catch (error) {
        console.error("Erreur lors du chargement du fichier JSON :", error);
        document.getElementById('courses-tbody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#ff4444;">Aucune course trouvée. Ajoutez votre première course dans l\'administration !</td></tr>';
      }
    }

    // Affichage des lignes dynamiques
    function renderTable(data) {
      const tbody = document.getElementById('courses-tbody');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#666;">Aucune course ne correspond aux filtres sélectionnés.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(c => `
        <tr>
          <td>
            <div style="display:flex; flex-direction:column;">
              <span style="font-weight:600;">${c.nom || '—'}</span>
              <span class="td-muted" style="font-size:0.85rem;">${c.lieu || '—'}</span>
            </div>
          </td>
          <td class="td-muted">${c.date || '—'}</td>
          <td><div class="badge-table ${c.type === 'Trail' ? 'badge-trail' : 'badge-route'}">${c.type || 'Route'}</div></td>
          <td class="td-num td-r">${c.dist || 0}<small>km</small></td>
          <td class="td-num td-r">${c.dplus ? c.dplus + '<small>m</small>' : '—'}</td>
          <td class="td-num td-r" style="font-weight:600;">${c.temps || '—'}</td>
          <td class="td-num td-r td-muted">${c.participants ? c.participants.toLocaleString('fr-FR') : '—'}</td>
          <td class="td-c">
            <div class="rank-pill ${rankClass(c.classementCat)}">
              ${c.classementCat || '—'}<small style="font-size:0.65rem; margin-left:2px; color:#aaa;">${c.cat || ''}</small>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Application des filtres d'affichage
    function applyFilters() {
      const filtered = courses.filter(c => {
        const typeOk = activeType === 'all' || c.type === activeType;
        const yearOk = activeYear === 'all' || c.annee === parseInt(activeYear);
        return typeOk && yearOk;
      });
      renderTable(filtered);
    }

    // Événements sur les boutons de filtres (Type)
    document.querySelectorAll('[data-type]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeType = btn.dataset.type;
        applyFilters();
      });
    });

    // Événements sur les boutons de filtres (Année)
    document.querySelectorAll('[data-year]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-year]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeYear = btn.dataset.year;
        applyFilters();
      });
    });

    // Lancement de la fonction au chargement de l'écran
    loadCourses();
  </script>
</body>
</html>
