<script>
let courses = [];

// Chargement des courses
async function loadCourses() {
  try {
    const response = await fetch('./courses.json');

    if (!response.ok) {
      throw new Error(`Erreur HTTP : ${response.status}`);
    }

    courses = await response.json();

    renderTable(courses);

  } catch (error) {
    console.error('Erreur lors du chargement des courses :', error);

    document.getElementById('races-body').innerHTML = `
      <tr>
        <td colspan="9" style="padding:2rem;text-align:center;color:#ff6b35;">
          Impossible de charger les courses.
        </td>
      </tr>
    `;
  }
}

function rankClass(n) {
  if (n === 1) return 'gold';
  if (n === 2) return 'silver';
  if (n === 3) return 'bronze';
  if (n <= 10) return 'top10';
  return '';
}

function renderTable(data) {
  const tbody = document.getElementById('races-body');
  const noRes = document.getElementById('no-results');

  document.getElementById('count').textContent = data.length;

  if (data.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }

  noRes.style.display = 'none';

  tbody.innerHTML = data.map(c => `
    <tr>
      <td class="td-c">
        <div class="rank-pill ${rankClass(c.classement)}">
          ${c.classement}
        </div>
      </td>

      <td>
        <div class="race-name">${c.nom}</div>
        <div class="race-location">${c.lieu}</div>
      </td>

      <td>
        <span class="badge badge-${c.type.toLowerCase()}">
          ${c.type}
        </span>
      </td>

      <td class="td-muted">${c.date}</td>

      <td class="td-num td-r">
        ${c.dist}<small>km</small>
      </td>

      <td class="td-num td-r ${c.dplus ? 'dplus' : 'td-muted'}">
        ${c.dplus ? c.dplus + '<small>m</small>' : '—'}
      </td>

      <td class="td-num td-r">
        ${c.temps}
      </td>

      <td class="td-num td-r td-muted">
        ${c.participants.toLocaleString('fr-FR')}
      </td>

      <td class="td-c">
        <div class="rank-pill ${rankClass(c.classementCat)}">
          ${c.classementCat}
          <small style="font-size:.58rem;font-weight:300;margin-left:.15rem">
            ${c.cat}
          </small>
        </div>
      </td>
    </tr>
  `).join('');
}

let activeType = 'all';
let activeYear = 'all';

function applyFilters() {
  const filtered = courses.filter(course => {

    const typeOk =
      activeType === 'all' ||
      course.type === activeType;

    const yearOk =
      activeYear === 'all' ||
      course.annee === Number(activeYear);

    return typeOk && yearOk;
  });

  renderTable(filtered);
}

// Filtres Type
document.querySelectorAll('[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {

    document
      .querySelectorAll('[data-type]')
      .forEach(b => b.classList.remove('active'));

    btn.classList.add('active');

    activeType = btn.dataset.type;

    applyFilters();
  });
});

// Filtres Année
document.querySelectorAll('[data-year]').forEach(btn => {
  btn.addEventListener('click', () => {

    document
      .querySelectorAll('[data-year]')
      .forEach(b => b.classList.remove('active'));

    btn.classList.add('active');

    activeYear = btn.dataset.year;

    applyFilters();
  });
});

// Lancement
loadCourses();
</script>
