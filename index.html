<script>
  // Fonction pour donner une couleur aux podiums
  function rankClassHome(rank) {
    if (rank === 1) return 'rank-1';
    if (rank === 2) return 'rank-2';
    if (rank === 3) return 'rank-3';
    return '';
  }

  async function loadHomeStats() {
    try {
      // Étape 1 : On lit le fichier unique généré par le CMS
      const response = await fetch('./courses.json');
      const data = await response.json();
      const courses = data.courses || [];
      
      // On trie les courses pour avoir les plus récentes en premier (selon la date)
      // Si tu n'as pas mis de date précise, on peut trier par l'année
      courses.sort((a, b) => b.annee - a.annee);

      // Étape 2 : Calcul des compteurs magiques
      const totalKm = courses.reduce((sum, c) => sum + (parseFloat(c.dist) || 0), 0);
      const totalDplus = courses.reduce((sum, c) => sum + (parseInt(c.dplus) || 0), 0);
      const totalPodiums = courses.filter(c => parseInt(c.classementCat) <= 3).length;

      // Étape 3 : Injection des résultats dans ton HTML
      // (Assure-toi que tes blocs HTML ont bien ces ID)
      if(document.getElementById('stat-count')) {
        document.getElementById('stat-count').innerText = courses.length;
      }
      if(document.getElementById('stat-km')) {
        document.getElementById('stat-km').innerHTML = `${totalKm.toFixed(0)}<small>km</small>`;
      }
      if(document.getElementById('stat-dplus')) {
        document.getElementById('stat-dplus').innerHTML = `${totalDplus.toLocaleString('fr-FR')}<small>m+</small>`;
      }
      if(document.getElementById('stat-podiums')) {
        document.getElementById('stat-podiums').innerText = totalPodiums;
      }

      // Étape 4 : Affichage des 4 dernières courses sur l'accueil
      const listContainer = document.getElementById('latest-races-list');
      if (listContainer) {
        const latestCourses = courses.slice(0, 4); // On prend les 4 premières
        
        if (latestCourses.length === 0) {
          listContainer.innerHTML = '<p style="text-align:center;color:#666;padding:1rem;">Aucune course récente. Ajoutez-en une dans l\'admin !</p>';
          return;
        }

        listContainer.innerHTML = latestCourses.map(c => `
          <a href="courses.html" class="race-row" style="text-decoration:none; color:inherit;">
            <div class="race-info">
              <div class="race-name" style="font-weight:600;">${c.nom || '—'}</div>
              <div class="race-meta" style="color:#666; font-size:0.85rem;">${c.date || c.annee} · ${c.lieu || '—'}</div>
            </div>
            <div style="display:flex; align-items:center; gap:15px; margin-left:auto;">
              <div class="badge-table ${c.type === 'Trail' ? 'badge-trail' : 'badge-route'}">${c.type || 'Route'}</div>
              <div class="race-dist" style="font-weight:600;">${c.dist}<small>km</small></div>
              <div class="race-time" style="color:#aaa;">${c.temps}</div>
            </div>
          </a>
        `).join('');
      }
    } catch (e) {
      console.error("Erreur lors du chargement des stats de l'accueil :", e);
    }
  }

  // Lancement au démarrage de la page
  loadHomeStats();
</script>
