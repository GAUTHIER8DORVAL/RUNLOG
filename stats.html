<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistiques - RUNLOG</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #fff; padding: 2rem; margin: 0; }
    h1 { margin-bottom: 2rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 2rem; }
    .stat-card { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #2d2d2d; text-align: center; }
    .stat-card h3 { margin: 0 0 10px 0; color: #888; font-size: 0.9rem; font-weight: 500; text-transform: uppercase; }
    .stat-card .value { font-size: 2rem; font-weight: bold; color: #fff; }
    .stat-card .value small { font-size: 1rem; color: #888; margin-left: 4px; }
    .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 2rem; }
    .chart-box { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #2d2d2d; min-height: 260px; }
    .chart-box h3 { margin-top: 0; margin-bottom: 1.5rem; font-size: 1.1rem; color: #aaa; font-weight: 500; }
    nav { margin-bottom: 2rem; }
    nav a { color: #888; text-decoration: none; margin-right: 20px; font-weight: 500; }
    nav a.active { color: #fff; border-bottom: 2px solid #fff; padding-bottom: 4px; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Accueil</a>
    <a href="courses.html">Mes Courses</a>
    <a href="stats.html" class="active">Statistiques</a>
  </nav>

  <h1>📊 Mes Statistiques</h1>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Distance Totale</h3>
      <div class="value" id="stat-total-km">0<small>km</small></div>
    </div>
    <div class="stat-card">
      <h3>Dénivelé Total</h3>
      <div class="value" id="stat-total-dplus">0<small>m+</small></div>
    </div>
    <div class="stat-card">
      <h3>Courses Courues</h3>
      <div class="value" id="stat-total-count">0</div>
    </div>
    <div class="stat-card">
      <h3>Nombre de Podiums</h3>
      <div class="value" id="stat-total-podiums" style="color: #ffd700;">0</div>
    </div>
  </div>

  <div class="charts-container">
    <div class="chart-box">
      <h3>Répartition par Type</h3>
      <canvas id="typeChart"></canvas>
    </div>
    <div class="chart-box">
      <h3>Volume de kilomètres par Année</h3>
      <canvas id="yearsChart"></canvas>
    </div>
  </div>

  <script>
    let typeChartInstance = null;
    let yearsChartInstance = null;

    async function loadStatsPage() {
      try {
        // 1. Récupération des données unifiées du CMS
        const response = await fetch('./courses.json');
        const data = await response.json();
        const courses = data.courses || [];

        if (courses.length === 0) {
          console.warn("Aucune donnée disponible pour les statistiques.");
          return;
        }

        // 2. Calculs mathématiques pour les compteurs globaux
        const totalKm = courses.reduce((sum, c) => sum + (parseFloat(c.dist) || 0), 0);
        const totalDplus = courses.reduce((sum, c) => sum + (parseInt(c.dplus) || 0), 0);
        const totalPodiums = courses.filter(c => parseInt(c.classementCat) <= 3).length;

        // Injection des valeurs calculées dans les cartes HTML
        document.getElementById('stat-total-km').innerHTML = `${totalKm.toFixed(1)}<small>km</small>`;
        document.getElementById('stat-total-dplus').innerHTML = `${totalDplus.toLocaleString('fr-FR')}<small>m+</small>`;
        document.getElementById('stat-total-count').innerText = courses.length;
        document.getElementById('stat-total-podiums').innerText = totalPodiums;

        // 3. Préparation des structures de données pour les graphiques
        // Compteur de types (Trail vs Route)
        const trailCount = courses.filter(c => c.type === 'Trail').length;
        const routeCount = courses.filter(c => c.type === 'Route').length;

        // Agrégation des kilomètres par année
        const kmPerYear = {};
        courses.forEach(c => {
          const year = c.annee || "Inconnu";
          const dist = parseFloat(c.dist) || 0;
          kmPerYear[year] = (kmPerYear[year] || 0) + dist;
        });

        // Tri des années par ordre chronologique pour l'axe du graphique
        const sortedYears = Object.keys(kmPerYear).sort((a, b) => a - b);
        const kmValues = sortedYears.map(year => kmPerYear[year]);

        // 4. Génération des graphiques avec Chart.js
        renderCharts(trailCount, routeCount, sortedYears, kmValues);

      } catch (error) {
        console.error("Erreur lors du traitement des données statistiques :", error);
      }
    }

    function renderCharts(trailCount, routeCount, yearsLabels, kmValues) {
      // Configuration globale des textes de Chart.js en blanc pour le thème sombre
      Chart.defaults.color = '#fff';
      Chart.defaults.borderColor = '#333';

      // Graphique 1 : Camembert (Pie) - Répartition Trail / Route
      const ctxType = document.getElementById('typeChart').getContext('2d');
      if (typeChartInstance) typeChartInstance.destroy();
      typeChartInstance = new Chart(ctxType, {
        type: 'doughnut',
        data: {
          labels: ['Trail', 'Route'],
          datasets: [{
            data: [trailCount, routeCount],
            backgroundColor: ['#2e7d32', '#1565c0'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom' }
          }
        }
      });

      // Graphique 2 : Histogramme (Bar) - Kilomètres par an
      const ctxYears = document.getElementById('yearsChart').getContext('2d');
      if (yearsChartInstance) yearsChartInstance.destroy();
      yearsChartInstance = new Chart(ctxYears, {
        type: 'bar',
        data: {
          labels: yearsLabels,
          datasets: [{
            label: 'Distance totale courue (km)',
            data: kmValues,
            backgroundColor: '#fc4c02', // Orange style Strava
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: { beginAtZero: true, grid: { color: '#222' } },
            x: { grid: { display: false } }
          }
        }
      });
    }

    // Initialisation automatique au chargement
    loadStatsPage();
  </script>
</body>
</html>
