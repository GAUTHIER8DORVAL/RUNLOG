<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiche Course — RunLog</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;500;700;900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #141418; --border: #222228;
      --accent: #e8ff47; --accent2: #ff6b35; --text: #f0f0ee; --muted: #6b6b72;
      --font-head: 'Barlow Condensed', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

    /* SVG icon helpers */
    .icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }
    .icon svg { display: block; }

    nav { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 3rem; border-bottom: 1px solid var(--border); background: rgba(13,13,15,.88); backdrop-filter: blur(12px); z-index: 100; }
    .logo { font-family: var(--font-head); font-weight: 900; font-size: 1.4rem; letter-spacing: .08em; text-transform: uppercase; color: var(--text); text-decoration: none; flex: 1; }
    .logo span { color: var(--accent); }
    nav ul { list-style: none; display: flex; gap: 2.5rem; justify-content: center; }
    nav a { font-family: var(--font-head); font-weight: 500; font-size: .95rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
    nav a:hover { color: var(--accent); }
    nav::after { content: ''; flex: 1; display: block; }

    .main-content { margin-top: 85px; }

    .back-link { display: inline-flex; align-items: center; gap: .6rem; font-family: var(--font-head); font-size: .85rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); text-decoration: none; padding: 1.5rem 4rem; width: 100%; border-bottom: 1px solid var(--border); transition: color .2s; }
    .back-link:hover { color: var(--accent); }
    .back-link:hover svg { stroke: var(--accent); }
    .back-link svg { stroke: var(--muted); transition: stroke .2s; }

    /* HERO */
    .race-hero { padding: 4rem; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: auto 1fr; gap: 3rem; align-items: center; position: relative; overflow: hidden; }
    .race-hero::after { content: attr(data-number); position: absolute; right: -0.02em; bottom: -.1em; font-family: var(--font-head); font-weight: 900; font-size: clamp(10rem, 20vw, 20rem); line-height: 1; color: transparent; -webkit-text-stroke: 1px var(--border); pointer-events: none; }
    .race-icon { width: 100px; height: 100px; background: var(--surface); border: 2px solid var(--accent); border-radius: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; z-index: 1; }
    .race-icon svg { stroke: var(--accent); }
    .race-info { position: relative; z-index: 1; }
    .race-tag { font-family: var(--font-head); font-size: .8rem; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); margin-bottom: .8rem; display: flex; align-items: center; gap: .5rem; }
    .race-tag::before { content: ''; display: block; width: 2rem; height: 1px; background: var(--accent); }
    .race-name-big { font-family: var(--font-head); font-weight: 900; font-size: clamp(2.2rem, 4.5vw, 4.5rem); line-height: .95; text-transform: uppercase; margin-bottom: 1rem; }
    .meta-badges { display: flex; align-items: center; gap: .8rem; flex-wrap: wrap; }
    .badge { font-family: var(--font-head); font-size: .78rem; letter-spacing: .15em; text-transform: uppercase; padding: .35rem .9rem; border-radius: 2px; display: inline-flex; align-items: center; gap: .45rem; }
    .badge-trail { background: rgba(232,255,71,.1); color: var(--accent); }
    .badge-route { background: rgba(255,107,53,.1); color: var(--accent2); }
    .badge-meta  { background: rgba(255,255,255,.05); color: var(--muted); }
    .badge-meta svg { stroke: var(--muted); }
    .badge-athlete { background: rgba(232,255,71,.08); color: var(--accent); text-decoration: none; transition: background .2s; }
    .badge-athlete svg { stroke: var(--accent); }
    .badge-athlete:hover { background: rgba(232,255,71,.18); }
    .badge-trail svg { stroke: var(--accent); }
    .badge-route svg { stroke: var(--accent2); }

    /* QUICK STATS */
    .quick-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .quick-stat { background: var(--surface); padding: 1.8rem 2rem; display: flex; flex-direction: column; gap: .3rem; }
    .quick-stat-val { font-family: var(--font-head); font-weight: 900; font-size: 2.5rem; line-height: 1; }
    .quick-stat-val span { color: var(--accent); font-size: 1.2rem; }
    .quick-stat-lbl { font-family: var(--font-head); font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }

    /* SECTIONS */
    .section { padding: 4rem; border-bottom: 1px solid var(--border); }
    .section:last-child { border-bottom: none; }
    .section-title { font-family: var(--font-head); font-weight: 900; font-size: clamp(1.6rem, 2.5vw, 2.4rem); text-transform: uppercase; margin-bottom: 2rem; }
    .section-title span { color: var(--accent); }

    /* PERF GRID */
    .perf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .perf-card { background: var(--bg); padding: 2rem; display: flex; flex-direction: column; gap: .4rem; }
    .perf-label { font-family: var(--font-head); font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
    .perf-value { font-family: var(--font-head); font-weight: 900; font-size: 2.8rem; line-height: 1; }
    .perf-value span { font-size: 1.1rem; color: var(--muted); font-weight: 300; margin-left: .2rem; }
    .perf-value.accent  { color: var(--accent); }
    .perf-value.accent2 { color: var(--accent2); }
    .perf-sub { font-size: .78rem; color: var(--muted); margin-top: .2rem; }

    /* BARRE % DEVANCÉS */
    .pct-bar-wrap { margin-top: .8rem; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .pct-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s ease; }

    /* CLASSEMENTS */
    .rank-duo { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-top: 1px; }
    .rank-block { background: var(--bg); padding: 2rem; }
    .rank-block-label { font-family: var(--font-head); font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: .6rem; }
    .rank-number { font-family: var(--font-head); font-weight: 900; font-size: 4rem; line-height: 1; }
    .rank-number small { font-size: 1.4rem; color: var(--muted); font-weight: 300; margin-left: .3rem; }
    .rank-number.gold   { color: #ffd700; }
    .rank-number.silver { color: #c0c0c0; }
    .rank-number.bronze { color: #cd7f32; }
    .rank-number.top10  { color: var(--accent); }
    .rank-detail { font-size: .8rem; color: var(--muted); margin-top: .4rem; display: flex; align-items: center; gap: .35rem; }
    .rank-detail svg { flex-shrink: 0; }

    /* COMPARAISON */
    .comp-table { width: 100%; border-collapse: collapse; }
    .comp-table thead th { font-family: var(--font-head); font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); padding: .75rem 1rem; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
    .comp-table thead th.tr { text-align: right; }
    .comp-table thead th.tc { text-align: center; }
    .comp-table tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    .comp-table tbody tr:hover { background: var(--surface); }
    .comp-table tbody tr.this-race { background: rgba(232,255,71,.06); border-left: 3px solid var(--accent); }
    .comp-table td { padding: .9rem 1rem; font-family: var(--font-head); font-size: .95rem; }
    .comp-table td.tr { text-align: right; }
    .comp-table td.tc { text-align: center; }
    .comp-name { font-weight: 700; font-size: 1rem; text-transform: uppercase; }
    .comp-meta { font-size: .72rem; color: var(--muted); margin-top: .1rem; }
    .rank-pill { display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-head); font-weight: 900; font-size: 1rem; min-width: 2rem; height: 2rem; padding: 0 .35rem; border-radius: 2px; background: var(--surface); color: var(--muted); }
    .rank-pill.gold   { background: rgba(255,215,0,.15);  color: #ffd700; }
    .rank-pill.silver { background: rgba(192,192,192,.15); color: #c0c0c0; }
    .rank-pill.bronze { background: rgba(205,127,50,.15);  color: #cd7f32; }
    .rank-pill.top10  { background: rgba(232,255,71,.1);   color: var(--accent); }
    .delta-pos { color: var(--accent); }
    .delta-neg { color: var(--accent2); }
    .delta-neu { color: var(--muted); }

    .empty-state { color: var(--muted); font-family: var(--font-head); text-transform: uppercase; letter-spacing: .08em; padding: 3rem 0; font-size: .9rem; }

    .not-found { text-align: center; padding: 8rem 2rem; }
    .not-found h2 { font-family: var(--font-head); font-weight: 900; font-size: 3rem; text-transform: uppercase; margin-bottom: 1rem; }
    .not-found p { color: var(--muted); }

    footer { border-top: 1px solid var(--border); padding: 2rem 4rem; display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: .8rem; }
    .footer-logo { font-family: var(--font-head); font-weight: 900; font-size: 1rem; letter-spacing: .1em; text-transform: uppercase; }
    .footer-logo span { color: var(--accent); }
    .footer-credit { display: flex; align-items: center; gap: .4rem; }
    .footer-credit svg { stroke: var(--accent2); fill: var(--accent2); }

    @media(max-width:900px) {
      nav { padding: 1rem 1.5rem; } nav ul { gap: 1.5rem; } nav::after { display: none; } .logo { flex: initial; }
      .main-content { margin-top: 65px; }
      .race-hero { padding: 3rem 1.5rem; grid-template-columns: 1fr; gap: 1.5rem; }
      .quick-stats { grid-template-columns: repeat(2,1fr); }
      .perf-grid { grid-template-columns: repeat(2,1fr); }
      .rank-duo { grid-template-columns: 1fr; }
      .section { padding: 2rem 1.5rem; }
      .back-link { padding: 1rem 1.5rem; }
      footer { flex-direction: column; gap: .5rem; text-align: center; padding: 1.5rem; }
    }
    @media(max-width:600px) {
      .perf-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>

</head>

  function applyBaseLanguage(lang) {
    currentLang = ['fr', 'en', 'es'].includes(lang) ? lang : 'fr';
    const t = translations[currentLang];

    if(document.getElementById('nav-home')) document.getElementById('nav-home').textContent = t.nav_home;
    if(document.getElementById('nav-runs')) document.getElementById('nav-runs').textContent = t.nav_runs;
    if(document.getElementById('nav-stats')) document.getElementById('nav-stats').textContent = t.nav_stats;
    if(document.getElementById('nav-profile')) document.getElementById('nav-profile').textContent = t.nav_profile;
    if(document.getElementById('loading-lbl')) document.getElementById('loading-lbl').textContent = t.loading;

    var params = new URLSearchParams(window.location.search);
    var from   = params.get('from');
    var uid    = params.get('uid');
    var bl     = document.getElementById('back-link');
    var blt    = document.getElementById('back-link-text');
    if (bl) {
      if (from === 'athlete' && uid) {
        bl.href = 'athlete.html?id=' + uid;
        if(blt) blt.textContent = t.back_athlete;
      } else if (from === 'athlete') {
        bl.href = '#';
        if(blt) blt.textContent = t.back_generic;
      } else {
        bl.href = 'courses.html';
        if(blt) blt.textContent = t.back_default;
      }
    }
  }

  // ── HELPERS ──────────────────────────────────────────────────────────────
  function tempsEnSecondes(t) {
    if (!t) return null;
    t = String(t).trim();
    if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(t)) {
      var parts = t.split(':').map(Number);
      if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
      if (parts.length === 2) return parts[0]*3600 + parts[1]*60;
    }
    var hms = t.match(/^(\d+)h(\d+)m?(\d+)?s?$/i);
    if (hms) return parseInt(hms[1])*3600 + parseInt(hms[2])*60 + (parseInt(hms[3])||0);
    var ms = t.match(/^(\d+)m(\d+)s?$/i);
    if (ms) return parseInt(ms[1])*60 + parseInt(ms[2]);
    return null;
  }

  function formatAllure(secParKm) {
    if (!secParKm || secParKm <= 0 || !isFinite(secParKm)) return '—';
    var m = Math.floor(secParKm / 60);
    var s = Math.round(secParKm % 60);
    if (s === 60) { m++; s = 0; }
    return m + "'" + String(s).padStart(2, '0') + '"';
  }

  function vitesseMoyenne(dist, totalSec) {
    if (!dist || !totalSec || totalSec <= 0) return null;
    return (dist / (totalSec / 3600)).toFixed(2);
  }

  function pctDevanc(classement, participants) {
    var cls = parseInt(classement);
    var tot = parseInt(participants);
    if (!cls || !tot || tot < 2 || cls < 1) return null;
    return Math.round((1 - (cls - 1) / (tot - 1)) * 100);
  }

  function rankClass(n) {
    n = parseInt(n);
    if (n === 1) return 'gold';
    if (n === 2) return 'silver';
    if (n === 3) return 'bronze';
    if (n <= 10) return 'top10';
    return '';
  }

  function formatOrdinal(n) {
    if (!n) return '—';
    if (currentLang === 'fr') {
      return n + (parseInt(n) === 1 ? 'er' : 'e');
    } else if (currentLang === 'es') {
      return n + 'º';
    } else {
      var val = parseInt(n);
      if (val === 1) return val + 'st';
      if (val === 2) return val + 'nd';
      if (val === 3) return val + 'rd';
      return val + 'th';
    }
  }

  function estSimilaire(ref, other) {
    if (other.id === ref.id) return false;
    if ((other.type||'').toLowerCase() !== (ref.type||'').toLowerCase()) return false;
    var d1 = parseFloat(ref.dist) || 0;
    var d2 = parseFloat(other.dist) || 0;
    if (d1 > 0 && d2 > 0 && Math.abs(d1-d2)/d1 > 0.35) return false;
    var dp1 = parseInt(ref.dplus) || 0;
    var dp2 = parseInt(other.dplus) || 0;
    if (dp1 > 100) {
      if (dp2 === 0) return false;
      if (Math.abs(dp1-dp2)/dp1 > 0.50) return false;
    } else {
      if (dp2 > dp1*3 + 200) return false;
    }
    return true;
  }

  // ── MAIN ────────────────────────────────────────────────────────────────
  async function loadRace() {
    var params  = new URLSearchParams(window.location.search);
    var raceId  = params.get('id');
    var content = document.getElementById('race-content');
    const t = translations[currentLang];

    if (!raceId) {
      content.innerHTML = '<div class="not-found"><h2>' + t.not_found_title + '</h2><p>' + t.not_found_uid + '</p></div>';
      return;
    }

    var raceRes = await supabaseClient.from('courses').select('*').eq('id', raceId).maybeSingle();
    if (raceRes.error || !raceRes.data) {
      content.innerHTML = '<div class="not-found"><h2>' + t.not_found_title + '</h2><p>' + t.not_found_exist + '</p></div>';
      return;
    }
    var c = raceRes.data;

    var profRes = await supabaseClient.from('profiles').select('username').eq('id', c.user_id).maybeSingle();
    var username = (profRes.data && profRes.data.username) || t.default_athlete;

    var allRes = await supabaseClient.from('courses').select('*').eq('user_id', c.user_id).order('annee', { ascending: false });
    var toutesLesCoures = allRes.data || [];

    document.title = c.nom + ' — RunLog';

    var dist      = parseFloat(c.dist) || 0;
    var totalSec  = tempsEnSecondes(c.temps);
    var allureSec = (totalSec && dist > 0) ? totalSec / dist : null;
    var vitesse   = vitesseMoyenne(dist, totalSec);
    var pct       = pctDevanc(c.classement, c.participants);
    var similaires = toutesLesCoures.filter(function(o){ return estSimilaire(c, o); });

    var isTrail = (c.type||'').toLowerCase() === 'trail';
    var iconSvg = isTrail ? ICONS.trail : ICONS.run;
    var dateLbl = c.date || c.annee || '—';

    // ── HERO ──
    var heroNum = c.classement ? String(c.classement).padStart(2,'0') : '—';
    var html = '<div class="race-hero" data-number="' + heroNum + '">'
      + '<div class="race-icon">' + iconSvg + '</div>'
      + '<div class="race-info">'
      + '<div class="race-tag">' + t.race_tag + '</div>'
      + '<div class="race-name-big">' + c.nom + '</div>'
      + '<div class="meta-badges">'
      + '<span class="badge badge-' + (isTrail?'trail':'route') + '">' + ICONS[isTrail?'trail_sm':'run_sm'] + (c.type||'—') + '</span>'      + (c.lieu ? '<span class="badge badge-meta">' + ICONS.pin + ' ' + c.lieu + '</span>' : '')
      + '<span class="badge badge-meta">' + ICONS.cal + ' ' + dateLbl + '</span>'
      + '<a href="athlete.html?id=' + c.user_id + '" class="badge badge-athlete">' + ICONS.user.replace('stroke-width="2"','stroke-width="2"') + ' ' + username + '</a>'
      + '</div></div></div>';

    // ── QUICK STATS ──
    html += '<div class="quick-stats">'
      + '<div class="quick-stat"><div class="quick-stat-val">' + (dist||'—') + '<span>km</span></div><div class="quick-stat-lbl">' + t.lbl_dist + '</div></div>'
      + '<div class="quick-stat"><div class="quick-stat-val">' + (c.dplus ? c.dplus.toLocaleString(t.locale) : '—') + (c.dplus?'<span>m+</span>':'') + '</div><div class="quick-stat-lbl">' + t.lbl_dplus + '</div></div>'
      + '<div class="quick-stat"><div class="quick-stat-val">' + (c.temps||'—') + '</div><div class="quick-stat-lbl">' + t.lbl_time + '</div></div>'
      + '<div class="quick-stat"><div class="quick-stat-val">' + (c.participants ? c.participants.toLocaleString(t.locale) : '—') + '</div><div class="quick-stat-lbl">' + t.lbl_part + '</div></div>'
      + '</div>';

    // ── PERFORMANCES ──
    html += '<div class="section"><div class="section-title">' + t.title_perf + '</div>';
    html += '<div class="perf-grid">'
      + '<div class="perf-card">'
      + '<div class="perf-label">' + t.lbl_allure + '</div>'
      + '<div class="perf-value accent">' + (allureSec ? formatAllure(allureSec) : '—') + '</div>'
      + '<div class="perf-sub">' + t.lbl_allure_unit + '</div>'
      + '</div>'
      + '<div class="perf-card">'
      + '<div class="perf-label">' + t.lbl_vitesse + '</div>'
      + '<div class="perf-value">' + (vitesse ? vitesse + '<span>km/h</span>' : '—') + '</div>'
      + '<div class="perf-sub">' + t.lbl_vitesse_sub.replace('{d}', (dist||'?')) + '</div>'
      + '</div>'
      + '<div class="perf-card">'
      + '<div class="perf-label">' + t.lbl_beaten + '</div>'
      + '<div class="perf-value accent2">' + (pct !== null ? pct + '<span>%</span>' : '—') + '</div>'
      + (pct !== null
          ? '<div class="pct-bar-wrap"><div class="pct-bar" id="pct-bar" style="width:0%"></div></div>'
          : '<div class="perf-sub">' + t.lbl_insufficient + '</div>')
      + '</div>'
      + '</div>';

    // Classements
    var clsGen = parseInt(c.classement) || null;
    var clsCat = parseInt(c.classement_cat) || null;
    html += '<div class="rank-duo">'
      + '<div class="rank-block">'
      + '<div class="rank-block-label">' + t.lbl_gen_rank + '</div>'
      + '<div class="rank-number ' + (clsGen?rankClass(clsGen):'') + '">'
      + (clsGen ? formatOrdinal(clsGen) : '—') + (c.participants && clsGen ? '<small>/ ' + parseInt(c.participants).toLocaleString(t.locale) + '</small>' : '')
      + '</div>'
      + (clsGen && c.participants ? '<div class="rank-detail">' + ICONS.chevron_right + ' ' + t.lbl_top_pct.replace('{p}', Math.ceil(clsGen/c.participants*100)) + '</div>' : '')
      + '</div>'
      + '<div class="rank-block">'
      + '<div class="rank-block-label">' + t.lbl_cat_rank + (c.cat ? ' <em style="font-weight:300;font-style:normal;color:var(--muted)">(' + c.cat + ')</em>' : '') + '</div>'
      + '<div class="rank-number ' + (clsCat?rankClass(clsCat):'') + '">' + (clsCat ? formatOrdinal(clsCat) : '—') + '</div>'
      + (clsCat <= 3 && clsCat ? '<div class="rank-detail" style="color:var(--accent)">' + ICONS.award + ' ' + t.lbl_podium + '</div>' : '')
      + '</div>'
      + '</div>'
      + '</div>';

    // ── COMPARAISON ──
    html += '<div class="section"><div class="section-title">' + t.title_sim + '</div>';
    html += '<div style="font-size:.8rem;color:var(--muted);margin-bottom:1.5rem;font-family:var(--font-head);letter-spacing:.05em;text-transform:uppercase">'
      + t.sub_sim.replace('{type}', (isTrail?'trail':'route')) + '</div>';

    if (similaires.length === 0) {
      html += '<div class="empty-state">' + t.empty_sim + '</div>';
    } else {
      var listComp = [c].concat(similaires).sort(function(a,b){
        var sa = tempsEnSecondes(a.temps) || Infinity;
        var sb = tempsEnSecondes(b.temps) || Infinity;
        return sa - sb;
      });

      html += '<div style="overflow-x:auto"><table class="comp-table">'
        + '<thead><tr>'
        + '<th>' + t.th_race + '</th>'
        + '<th class="tr">' + t.th_dist + '</th>'
        + '<th class="tr">' + t.th_dplus + '</th>'
        + '<th class="tr">' + t.th_time + '</th>'
        + '<th class="tr">' + t.th_allure + '</th>'
        + '<th class="tr">' + t.th_vitesse + '</th>'
        + '<th class="tc">' + t.th_clt_gen + '</th>'
        + '<th class="tc">' + t.th_clt_cat + '</th>'
        + '<th class="tr">' + t.th_pct + '</th>'
        + '</tr></thead><tbody>';

      listComp.forEach(function(r) {
        var isCurrent = r.id === c.id;
        var rSec    = tempsEnSecondes(r.temps);
        var rDist   = parseFloat(r.dist) || 0;
        var rAllure = (rSec && rDist > 0) ? rSec / rDist : null;
        var rVit    = vitesseMoyenne(rDist, rSec);
        var rPct    = pctDevanc(r.classement, r.participants);

        var deltaStr = '';
        if (!isCurrent && allureSec && rAllure) {
          var d = Math.round(rAllure - allureSec);
          if       (d >  5) deltaStr = ' <span class="delta-neg">(+' + Math.abs(d) + '" /km)</span>';
          else if (d < -5) deltaStr = ' <span class="delta-pos">(−' + Math.abs(d) + '" /km)</span>';
          else             deltaStr = ' <span class="delta-neu">(≈)</span>';
        }

        html += '<tr class="' + (isCurrent?'this-race':'') + '">'
          + '<td><div class="comp-name">' + r.nom
          + (isCurrent
              ? ' <span style="display:inline-flex;align-items:center;gap:.2rem;color:var(--accent);font-size:.7rem;font-weight:500">'
                + ICONS.chevron_right + t.current_race_marker + '</span>'
              : '')
          + '</div>'
          + '<div class="comp-meta">' + (r.date||r.annee||'—') + (r.lieu?' · '+r.lieu:'') + '</div></td>'
          + '<td class="tr">' + (rDist||'—') + '<span style="color:var(--muted);font-size:.75rem"> km</span></td>'
          + '<td class="tr">' + (r.dplus ? parseInt(r.dplus).toLocaleString(t.locale)+'<span style="color:var(--muted);font-size:.75rem"> m</span>' : '—') + '</td>'
          + '<td class="tr">' + (r.temps||'—') + '</td>'
          + '<td class="tr">' + (rAllure ? formatAllure(rAllure) : '—') + deltaStr + '</td>'
          + '<td class="tr">' + (rVit ? rVit+'<span style="color:var(--muted);font-size:.75rem"> km/h</span>' : '—') + '</td>'
          + '<td class="tc"><div class="rank-pill ' + rankClass(r.classement) + '">' + (r.classement||'—') + '</div></td>'
          + '<td class="tc"><div class="rank-pill ' + rankClass(r.classement_cat) + '">' + (r.classement_cat||'—') + '</div></td>'
          + '<td class="tr">' + (rPct!==null ? rPct+'%' : '—') + '</td>'
          + '</tr>';
      });
      html += '</tbody></table></div>';
    }
    html += '</div>';

    content.innerHTML = html;

    if (pct !== null) {
      requestAnimationFrame(function(){
        setTimeout(function(){
          var bar = document.getElementById('pct-bar');
          if (bar) bar.style.width = pct + '%';
        }, 200);
      });
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    var fallbackLang = localStorage.getItem('runlog_lang') || (navigator.language || navigator.userLanguage).split('-')[0];
    applyBaseLanguage(fallbackLang);

    if (supabaseClient) {
      supabaseClient.auth.getUser().then(async function(res) {
        if (res.data && res.data.user) {
          try {
            const { data: profile } = await supabaseClient
              .from('profiles')
              .select('langue')
              .eq('id', res.data.user.id)
              .maybeSingle();

            if (profile && profile.langue) {
              applyBaseLanguage(profile.langue);
            }
          } catch(e) {
            console.error(e);
          }
        }
        loadRace();
      });
    } else {
      loadRace();
    }
  });
</script>
</body>
</html>
